name: Update MarkItDown Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new version"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target source version to build (e.g. v0.1.5 or 0.1.5). Leave empty for latest."
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Reserved for lzcat-trigger compatibility"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: microsoft/markitdown
  PROJECT_NAME: MarkItDown Web & MCP
  PROJECT_SLUG: markitdown

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve upstream version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            if [[ "$TARGET_VERSION" == v* ]]; then
              SOURCE_VERSION="$TARGET_VERSION"
            else
              SOURCE_VERSION="v$TARGET_VERSION"
            fi
            BUILD_VERSION="${SOURCE_VERSION#v}"
          else
            RELEASE_TAG=$(gh api "repos/${{ env.UPSTREAM_REPO }}/releases/latest" --jq '.tag_name' 2>/dev/null || true)
            if [ -n "$RELEASE_TAG" ]; then
              SOURCE_VERSION="$RELEASE_TAG"
            else
              TAG_NAME=$(gh api "repos/${{ env.UPSTREAM_REPO }}/tags?per_page=20" --jq '.[].name' 2>/dev/null | head -1 || true)
              SOURCE_VERSION="${TAG_NAME:-v0.1.5}"
            fi
            BUILD_VERSION="${SOURCE_VERSION#v}"
          fi

          echo "source_version=$SOURCE_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved source version: $SOURCE_VERSION"
          echo "Resolved build version: $BUILD_VERSION"

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_SOURCE_VERSION=$(jq -r '.source_version // empty' .lazycat-build.json 2>/dev/null || true)
          SOURCE_VERSION="${{ steps.version.outputs.source_version }}"
          FORCE_BUILD="${{ inputs.force_build }}"
          TARGET_VERSION="${{ inputs.target_version }}"

          echo "Current source version: ${CURRENT_SOURCE_VERSION:-<none>}"
          echo "Target source version: $SOURCE_VERSION"

          if [ -n "$TARGET_VERSION" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ "$FORCE_BUILD" = "true" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ "$CURRENT_SOURCE_VERSION" != "$SOURCE_VERSION" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download upstream source
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          SOURCE_VERSION="${{ steps.version.outputs.source_version }}"
          ARCHIVE_URL="https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/tarball/$SOURCE_VERSION"
          mkdir -p /tmp/markitdown-source
          curl -L "$ARCHIVE_URL" | tar -xz -C /tmp/markitdown-source --strip-components=1
          mkdir -p /tmp/markitdown-source/packages/lazycat-markitdown-web
          cp -R "${{ github.workspace }}/lazycat"/. /tmp/markitdown-source/packages/lazycat-markitdown-web/

      - name: Build and push image to ghcr.io
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_VERSION="${{ steps.version.outputs.source_version }}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}:$SOURCE_VERSION"
          GHCR_IMAGE=$(echo "$GHCR_IMAGE" | tr '[:upper:]' '[:lower:]')

          docker build \
            -f "${{ github.workspace }}/Dockerfile.template" \
            -t "$GHCR_IMAGE" \
            /tmp/markitdown-source

          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker push "$GHCR_IMAGE"

          echo "Built and pushed image: $GHCR_IMAGE"
